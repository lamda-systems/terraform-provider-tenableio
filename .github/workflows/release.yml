name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for skip release
        id: skip
        working-directory: .
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: ${COMMIT_MSG}"
          if echo "${COMMIT_MSG}" | grep -qiF '[skip release]'; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "Skipping release due to [skip release] in commit message"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/setup-go@v6
        if: steps.skip.outputs.skip == 'false'
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Determine version bump
        if: steps.skip.outputs.skip == 'false'
        id: version
        working-directory: .
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${LATEST_TAG}" >> "${GITHUB_OUTPUT}"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION}"

          # Determine bump type from merge commit message
          # GitHub merge commits look like: "Merge pull request #N from org/major/branch-name"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: ${COMMIT_MSG}"

          if echo "${COMMIT_MSG}" | grep -qiE '(from [^ ]+/)?major/'; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            BUMP="major"
          elif echo "${COMMIT_MSG}" | grep -qiE '(from [^ ]+/)?minor/'; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi

          NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "bump=${BUMP}" >> "${GITHUB_OUTPUT}"
          echo "next_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"
          echo "Bump: ${BUMP} | ${LATEST_TAG} -> ${NEXT_TAG}"

      - name: Create tag
        if: steps.skip.outputs.skip == 'false'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.next_tag }}" -m "Release ${{ steps.version.outputs.next_tag }}"
          git push origin "${{ steps.version.outputs.next_tag }}"

      - name: Import GPG key
        if: steps.skip.outputs.skip == 'false'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          GPG_FINGERPRINT=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_FINGERPRINT=${GPG_FINGERPRINT}" >> "${GITHUB_ENV}"

      - name: Run GoReleaser
        if: steps.skip.outputs.skip == 'false'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.16.0
          args: release --clean
          workdir: src
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ env.GPG_FINGERPRINT }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
